name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android Build Tools
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "build-tools;34.0.0" "platforms;android-34" 2>&1 | tail -5
          echo "Build tools installed: $(ls $ANDROID_HOME/build-tools/)"

      - name: Download Godot Engine 4.5.0 (Linux Headless)
        run: |
          curl -L -o godot.zip https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_linux.x86_64.zip
          unzip godot.zip
          chmod +x Godot_v4.5-stable_linux.x86_64
          sudo mv Godot_v4.5-stable_linux.x86_64 /usr/local/bin/godot

      - name: Download and Install Godot Export Templates
        run: |
          curl -L -o templates.tpz https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_export_templates.tpz
          unzip templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.5.stable/
          mv templates/* ~/.local/share/godot/export_templates/4.5.stable/

      - name: Configure Godot Editor Settings (Android SDK)
        run: |
          mkdir -p ~/.config/godot
          printf '[gd_resource type="EditorSettings" format=3]\n[resource]\nexport/android/android_sdk_path = "%s"\nexport/android/java_sdk_path = "%s"\n' "$ANDROID_HOME" "$JAVA_HOME" > ~/.config/godot/editor_settings-4.tres
          cat ~/.config/godot/editor_settings-4.tres

      - name: Disable GodotSteam plugin for CI
        run: |
          sed -i 's|"res://addons/godotsteam/godotsteam_plugin.gd"||g' project.godot
          sed -i '/godotsteam/d' project.godot

      - name: Import Project Assets
        run: |
          godot --headless --path . --editor --quit 2>&1 || true

      - name: Export Android APK
        run: |
          mkdir -p build/android
          godot --headless --path . --export-release "Android" build/android/Train45.apk 2>&1

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Train45-Android-APK
          path: build/android/Train45.apk
