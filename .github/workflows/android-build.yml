name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Download Godot Engine 4.5.0 (Linux Headless)
        run: |
          curl -L -o godot.zip https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_linux.x86_64.zip
          unzip godot.zip
          chmod +x Godot_v4.5-stable_linux.x86_64
          sudo mv Godot_v4.5-stable_linux.x86_64 /usr/local/bin/godot

      - name: Download and Install Godot Export Templates
        run: |
          curl -L -o templates.tpz https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_export_templates.tpz
          unzip templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/4.5.stable/
          mv templates/* ~/.local/share/godot/export_templates/4.5.stable/

      - name: Configure Godot Android SDK Path
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres << 'EOF'
          [gd_resource type="EditorSettings" format=3]
          [resource]
          export/android/android_sdk_path = "/usr/local/lib/android/sdk"
          export/android/debug_keystore = ""
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Export Android APK
        run: |
          mkdir -p build/android
          godot --headless --path . --import || true
          godot --headless --path . --export-release "Android" build/android/Train45.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Train45-Android-APK
          path: build/android/Train45.apk
