name: Build iOS

on:
  workflow_dispatch:
    inputs:
      export_mode:
        description: 'Export mode (debug/release)'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

env:
  GODOT_VERSION: 4.5

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Godot binary cache
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: godot_cache/
          key: Godot_v${{ env.GODOT_VERSION }}-stable_macos.universal

      - name: Download Godot binary
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          curl -L -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_macos.universal.zip"
          mkdir -p godot_cache
          unzip -q godot.zip -d godot_cache/

      - name: Export path
        run: |
          echo "GODOT_BIN=$PWD/godot_cache/Godot.app/Contents/MacOS/Godot" >> $GITHUB_ENV

      - name: Restore export templates cache
        id: cache-templates
        uses: actions/cache@v4
        with:
          path: templates_cache/
          key: Godot_v${{ env.GODOT_VERSION }}-stable_export_templates

      - name: Download export templates
        if: steps.cache-templates.outputs.cache-hit != 'true'
        run: |
          curl -L -o templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz"
          mkdir -p templates_cache
          unzip -q templates.tpz -d templates_cache/

      - name: Install export templates
        run: |
          mkdir -p ~/Library/Application\ Support/Godot/export_templates/${{ env.GODOT_VERSION }}.stable
          cp -r templates_cache/templates/* ~/Library/Application\ Support/Godot/export_templates/${{ env.GODOT_VERSION }}.stable/

      - name: Setup code signing
        env:
          P12_BASE64: ${{ secrets.APPLE_CERTIFICATES_P12 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATES_P12_PASSWORD }}
          PROFILES_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILES }}
        run: |
          if [ -z "$P12_BASE64" ]; then
            echo "No signing certificates found - building unsigned"
            exit 0
          fi
          echo "$P12_BASE64" | base64 -d > cert.p12
          security import cert.p12 -P "$P12_PASSWORD" -A
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILES_BASE64" | base64 -d > profile.mobileprovision
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          echo "Code signing configured successfully"

      - name: Disable GodotSteam plugin for CI
        run: |
          rm -rf addons/godotsteam
          python3 -c "
          import re
          content = open('project.godot').read()
          content = re.sub(r'\"res://addons/godotsteam/[^\"]*\"', '', content)
          content = re.sub(r',\s*,', ',', content)
          content = re.sub(r'\(\s*,', '(', content)
          content = re.sub(r',\s*\)', ')', content)
          open('project.godot', 'w').write(content)
          "

      - name: Import project assets
        continue-on-error: true
        run: |
          rm -rf .godot/imported
          echo "=== Running editor import ==="
          $GODOT_BIN --headless --editor --quit --verbose 2>&1 || true
          echo "=== Imported cache files ==="
          find .godot/imported -type f 2>/dev/null | head -30 || true
          echo "=== Total imported ==="
          find .godot/imported -type f 2>/dev/null | wc -l || true

      - name: Export Xcode project
        run: |
          mkdir -p build/ios
          MODE="${{ inputs.export_mode || 'release' }}"
          if [ "$MODE" = "debug" ]; then
            $GODOT_BIN --headless --export-debug "iOS" build/ios/Train45.zip 2>&1
          else
            $GODOT_BIN --headless --export-release "iOS" build/ios/Train45.zip 2>&1
          fi
          echo "=== Unzipping Xcode project ==="
          unzip -q build/ios/Train45.zip -d build/ios/
          echo "=== build/ios/ contents ==="
          ls -la build/ios/
          ls -la build/ios/Train45.xcodeproj/
          echo "Xcode project exported to build/ios/"

      - name: Build Xcode project (unsigned)
        run: |
          xcodebuild -project build/ios/Train45.xcodeproj \
            -scheme Train45 \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            clean build 2>&1 || {
            echo "First build attempt failed, trying without clean..."
            xcodebuild -project build/ios/Train45.xcodeproj \
              -scheme Train45 \
              -sdk iphoneos \
              -configuration Release \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              DEVELOPMENT_TEAM="" \
              build 2>&1 || echo "BUILD_FAILED=true" >> $GITHUB_ENV
          }

      - name: Find and package .app
        if: env.BUILD_FAILED != 'true'
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "Train45.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find "$PWD" -name "Train45.app" -type d | head -n 1)
          fi
          echo "Found app at: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found!"
            exit 1
          fi
          mkdir -p Payload dist
          cp -r "$APP_PATH" Payload/
          zip -r dist/Train45-iOS.ipa Payload/
          echo "IPA created at: $PWD/dist/Train45-iOS.ipa"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Train45-iOS-${{ inputs.export_mode || 'release' }}
          path: dist/Train45-iOS.ipa
          if-no-files-found: error
