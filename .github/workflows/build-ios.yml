name: Build iOS

on:
  workflow_dispatch:

env:
  GODOT_VERSION: 4.5

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Godot binary cache
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: godot_cache/
          key: Godot_v${{ env.GODOT_VERSION }}-stable_macos.universal

      - name: Download Godot binary
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          curl -L -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_macos.universal.zip"
          mkdir -p godot_cache
          unzip -q godot.zip -d godot_cache/

      - name: Export path
        run: |
          echo "GODOT_BIN=$PWD/godot_cache/Godot.app/Contents/MacOS/Godot" >> $GITHUB_ENV

      - name: Restore export templates cache
        id: cache-templates
        uses: actions/cache@v4
        with:
          path: templates_cache/
          key: Godot_v${{ env.GODOT_VERSION }}-stable_export_templates

      - name: Download export templates
        if: steps.cache-templates.outputs.cache-hit != 'true'
        run: |
          curl -L -o templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz"
          mkdir -p templates_cache
          unzip -q templates.tpz -d templates_cache/

      - name: Install export templates
        run: |
          mkdir -p ~/Library/Application\ Support/Godot/export_templates/${{ env.GODOT_VERSION }}.stable
          cp -r templates_cache/templates/* ~/Library/Application\ Support/Godot/export_templates/${{ env.GODOT_VERSION }}.stable/

      - name: Disable GodotSteam plugin for CI
        run: |
          rm -rf addons/godotsteam
          python3 -c "
          import re
          content = open('project.godot').read()
          content = re.sub(r'\"res://addons/godotsteam/[^\"]*\"', '', content)
          content = re.sub(r',\s*,', ',', content)
          content = re.sub(r'\(\s*,', '(', content)
          content = re.sub(r',\s*\)', ')', content)
          open('project.godot', 'w').write(content)
          "

      - name: Export Xcode project (unsigned)
        run: |
          rm -rf .godot/imported
          mkdir -p build/ios
          rm -rf build/ios/Train45.xcodeproj build/ios/Train45.zip
          $GODOT_BIN --path . --export-release "iOS" build/ios/Train45.zip 2>&1 || true
          echo "=== build/ios/ contents ==="
          ls -la build/ios/

      - name: Build Xcode project (unsigned)
        run: |
          xcodebuild -project build/ios/Train45.xcodeproj \
            -scheme Train45 \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            build 2>&1

      - name: Package IPA
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "Train45.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find "$PWD" -name "Train45.app" -type d | head -n 1)
          fi
          mkdir -p Payload dist
          cp -r "$APP_PATH" Payload/
          zip -r dist/Train45-iOS.ipa Payload/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Train45-iOS
          path: dist/Train45-iOS.ipa
          if-no-files-found: error
